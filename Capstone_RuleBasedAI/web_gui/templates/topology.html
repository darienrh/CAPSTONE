<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topology — Network Diagnostic Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-router"></i> Network Diagnostic Tool
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="/" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-terminal"></i> Diagnostics
                </a>
                <button id="theme-toggle" title="Toggle theme" onclick="toggleTheme()">
                    <i class="bi bi-sun-fill" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 620px;">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-diagram-3"></i> GNS3 Web UI
            </div>
            <div class="card-body">
                <p style="font-size:0.88rem; color:var(--text-secondary); margin-bottom: 1.25rem;">
                    Paste your GNS3 Web UI URL below. Saved locally and opens in a new tab.
                </p>
                <div class="mb-3">
                    <label class="form-label">GNS3 Web UI URL</label>
                    <div class="d-flex gap-2">
                        <input type="text" class="form-control" id="gns3-url"
                            placeholder="http://localhost:3080/static/web-ui/server/1/project/...">
                        <button class="btn btn-primary" onclick="openGns3()">
                            <i class="bi bi-box-arrow-up-right"></i> Open
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='topology.js') }}"></script>
</body>

</html>
