<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Diagnostic Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-router"></i> Network Diagnostic Tool
            </a>
            <div class="d-flex align-items-center gap-3">
                <span id="status-badge" class="status-badge status-secondary">
                    <i class="bi bi-circle-fill"></i> idle
                </span>
                <button class="btn btn-sm btn-outline-secondary" onclick="openTopology()">
                    <i class="bi bi-diagram-3"></i> Topology
                </button>
                <button id="theme-toggle" title="Toggle theme" onclick="toggleTheme()">
                    <i class="bi bi-sun-fill" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-gear"></i> Configuration
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">GNS3 URL</label>
                            <input type="text" class="form-control" id="gns3-url" value="http://192.168.231.1:3080">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Devices (comma-separated, blank = all)</label>
                            <input type="text" class="form-control" id="devices" placeholder="e.g. r1, r2, r3">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Discovered Routers</label>
                            <div id="device-list" class="p-2">
                                <span class="text-secondary fst-italic" style="font-size:0.82rem;">Not connected</span>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button id="btn-start" class="btn btn-primary" onclick="startDiagnostics()">
                                <i class="bi bi-play-fill"></i> Run Diagnostics
                            </button>
                            <button id="btn-stop" class="btn btn-danger" onclick="stopDiagnostics()" disabled>
                                <i class="bi bi-stop-fill"></i> Stop
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-terminal"></i> Output Log</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="clearLog()">
                            <i class="bi bi-trash"></i> Clear
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div id="log-container"></div>
                    </div>
                </div>

                <div id="prompt-container" style="display:none;" class="card mt-2">
                    <div class="card-header"><i class="bi bi-question-circle"></i> Input Required</div>
                    <div class="card-body">
                        <p id="promptQuestion" class="mb-2"></p>
                        <div id="promptInputContainer"></div>
                        <div id="promptFooter" class="mt-2 d-flex gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        function openTopology() {
            var gns3Url = document.getElementById('gns3-url').value || 'http://192.168.231.1:3080';
            var match = gns3Url.match(/^https?:\/\/([^:\/]+)(?::(\d+))?/);
            var host = match ? match[1] : '192.168.231.1';
            var port = match ? (match[2] || '3080') : '3080';
            window.open(
                'http://' + host + ':' + port +
                '/static/web-ui/server/1/project/efcd850a-ea6b-4846-855f-0513dad86b65?host=' +
                host + '&port=' + port + '&ssl=false',
                '_blank'
            );
        }
    </script>
</body>

</html>
