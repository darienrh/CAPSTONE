<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Diagnostic Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-router"></i> Network Diagnostic Tool
            </a>
            <div class="d-flex align-items-center">
                <span id="status-badge" class="status-badge status-idle me-3">
                    <i class="bi bi-circle"></i> idle
                </span>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Configuration Panel -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-gear"></i> Configuration
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">GNS3 URL</label>
                            <input type="text" class="form-control" id="gns3-url" value="http://localhost:3080">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Devices (comma-separated, blank = all)</label>
                            <input type="text" class="form-control" id="devices" placeholder="e.g. r1, r2, r3">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Discovered Routers</label>
                            <div id="device-list" class="p-2">
                                <span class="text-secondary fst-italic">Not connected</span>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button id="btn-start" class="btn btn-primary" onclick="startDiagnostics()">
                                <i class="bi bi-play-fill"></i> Run Diagnostics
                            </button>
                            <button id="btn-stop" class="btn btn-danger" onclick="stopDiagnostics()" disabled>
                                <i class="bi bi-stop-fill"></i> Stop
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Log Output -->
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-terminal"></i> Output Log</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="clearLog()">
                            <i class="bi bi-trash"></i> Clear
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div id="log-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Prompt Modal -->
    <div class="modal fade prompt-modal" id="promptModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="promptTitle">Input Required</h5>
                </div>
                <div class="modal-body">
                    <p id="promptQuestion"></p>
                    <div id="promptInputContainer"></div>
                </div>
                <div class="modal-footer" id="promptFooter"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
